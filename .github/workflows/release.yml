name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore:') && !contains(github.event.head_commit.message, 'docs:') && !contains(github.event.head_commit.message, 'chore: release')"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.RELEASE_TOKEN }}

    - name: Debug Info
      run: |
        echo "Current tags:"
        git tag -l
        echo "Current npm versions:"
        npm view pg-boss-dashboard versions || echo "Package not found in npm"

    - name: Git config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Fetch all tags
      run: git fetch --tags origin

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Install UI dependencies
      working-directory: ./package/ui
      run: npm ci

    - name: Install API dependencies
      working-directory: ./package/api
      run: npm ci

    - name: Build UI
      working-directory: ./package/ui
      run: npm run build

    - name: Build API
      working-directory: ./package/api
      run: npm run build

    - name: Save pre-release version
      id: pre_release
      run: |
        echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Release
      id: release
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        npm run release -- --ci \
          --git.requireUpstream=false \
          --verbose

    - name: Get released version
      id: version
      if: success()
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "released_version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Released version: v${VERSION}"

    - name: Verify Release
      if: success()
      env:
        VERSION: ${{ steps.version.outputs.released_version }}
      run: |
        echo "Verifying release v${VERSION}"

        # Check git tag
        git tag -l "v${VERSION}"

        # Check npm
        npm view pg-boss-dashboard versions

        # Check GitHub release
        curl -H "Authorization: token ${{ secrets.RELEASE_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}"

    - name: Rollback on failure
      if: failure() && steps.pre_release.outputs.version != ''
      env:
        PRE_VERSION: ${{ steps.pre_release.outputs.version }}
      run: |
        # Determine the version that was attempted
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        if [ "$CURRENT_VERSION" = "$PRE_VERSION" ]; then
          echo "Version unchanged, nothing to rollback"
          exit 0
        fi
        VERSION="$CURRENT_VERSION"
        echo "Rolling back version v${VERSION}"

        # Delete tags
        git tag -d "v${VERSION}" 2>/dev/null || true
        git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

        # Delete GitHub release
        curl -X DELETE \
          -H "Authorization: token ${{ secrets.RELEASE_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
          2>/dev/null || true

        # Unpublish from npm
        npm unpublish "pg-boss-dashboard@${VERSION}" 2>/dev/null || true

        echo "Rollback completed"
