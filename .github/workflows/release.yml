name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Skip release-it and only publish current version to npm'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, 'chore:') &&
       !contains(github.event.head_commit.message, 'docs:') &&
       !contains(github.event.head_commit.message, 'chore: release'))

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.RELEASE_TOKEN }}

    - name: Git config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Fetch all tags
      run: git fetch --tags origin

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Install UI dependencies
      working-directory: ./package/ui
      run: npm ci

    - name: Install API dependencies
      working-directory: ./package/api
      run: npm ci

    - name: Build UI
      working-directory: ./package/ui
      run: npm run build

    - name: Build API
      working-directory: ./package/api
      run: npm run build

    - name: Save pre-release version
      id: pre_release
      run: |
        echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Release
      id: release
      if: github.event.inputs.publish_only != 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        npm run release -- --ci \
          --git.requireUpstream=false \
          --verbose

    - name: Get released version
      id: version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "released_version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Released version: v${VERSION}"

    - name: Publish to npm
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "Publishing pg-boss-dashboard@${VERSION} to npm..."

        # Check if this version is already published
        if npm view "pg-boss-dashboard@${VERSION}" version 2>/dev/null; then
          echo "Version ${VERSION} is already published on npm, skipping"
        else
          npm publish
          echo "Successfully published pg-boss-dashboard@${VERSION} to npm"
        fi

    - name: Verify Release
      if: success()
      env:
        VERSION: ${{ steps.version.outputs.released_version }}
      run: |
        echo "Verifying release v${VERSION}"
        git tag -l "v${VERSION}"
        npm view pg-boss-dashboard versions

    - name: Rollback on failure
      if: failure() && steps.release.outcome == 'success'
      env:
        PRE_VERSION: ${{ steps.pre_release.outputs.version }}
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        if [ "$CURRENT_VERSION" = "$PRE_VERSION" ]; then
          echo "Version unchanged, nothing to rollback"
          exit 0
        fi
        VERSION="$CURRENT_VERSION"
        echo "Rolling back version v${VERSION}"

        # Delete tags
        git tag -d "v${VERSION}" 2>/dev/null || true
        git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

        # Delete GitHub release
        curl -X DELETE \
          -H "Authorization: token ${{ secrets.RELEASE_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
          2>/dev/null || true

        # Unpublish from npm
        npm unpublish "pg-boss-dashboard@${VERSION}" 2>/dev/null || true

        echo "Rollback completed"
