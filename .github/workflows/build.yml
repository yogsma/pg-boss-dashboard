name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'npm'

    - name: Build and test UI
      working-directory: ./package/ui
      run: |
        npm ci
        npm run lint
        npm run build

    - name: Build and test API
      working-directory: ./package/api
      run: |
        npm ci
        npm run build
